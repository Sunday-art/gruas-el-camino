<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grúas EL CAMINO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="header-container">
        <div>
            <span class="logo-main">GRÚAS</span>
            <span class="logo-sub">EL CAMINO</span>
        </div>

        <div>
            <a href="tel:4443338273" class="phone-link">444 333 8273</a>
            <div class="status-247">SERVICIO 24 HORAS</div>
        </div>
    </div>
</header>

<section class="gallery-section">
    <h2 class="title-sec">Así trabajamos</h2>

    <div class="carousel-wrapper">

        <button class="arrow left" onclick="scrollCarousel(-1)">❮</button>

        <div class="photo-grid" id="carousel">

            <img src="img/foto22.jpeg">
            <img src="img/foto16.jpeg">
            <img src="img/foto24.jpeg">
            <img src="img/foto10.jpeg">
            <img src="img/foto11.jpeg">
            <img src="img/foto12.jpeg">
            <img src="img/foto3.jpeg">
            <img src="img/foto41.jpeg">
            <img src="img/foto42.jpeg">
            <img src="img/foto43.jpeg">
            <img src="img/foto44.jpeg">
            <img src="img/foto45.jpeg">
            <img src="img/foto46.jpeg">

        </div>

        <button class="arrow right" onclick="scrollCarousel(1)">❯</button>

    </div>
</section>

<script>
const carousel = document.getElementById('carousel');
const images = carousel.querySelectorAll('img');

let speed = 0.4;

/* AUTO SCROLL SUAVE */
let autoScroll = setInterval(() => {
    carousel.scrollLeft += speed;
}, 10);

/* DETECTAR IMAGEN CENTRAL */
function updateCenter() {
    let center = carousel.scrollLeft + carousel.offsetWidth / 2;

    images.forEach(img => {
        let imgCenter = img.offsetLeft + img.offsetWidth / 2;

        if (Math.abs(center - imgCenter) < img.offsetWidth / 2) {
            img.classList.add('active');
        } else {
            img.classList.remove('active');
        }
    });
}

carousel.addEventListener('scroll', updateCenter);

/* PAUSA INTELIGENTE */
carousel.addEventListener('mouseenter', () => clearInterval(autoScroll));
carousel.addEventListener('mouseleave', () => {
    autoScroll = setInterval(() => {
        carousel.scrollLeft += speed;
    }, 10);
});

/* FLECHAS */
function scrollCarousel(direction) {
    carousel.scrollBy({
        left: direction * 300,
        behavior: 'smooth'
    });
}
</script>

</body>
</html>
