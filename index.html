<script>
const carousel = document.getElementById('carousel');
const images = carousel.querySelectorAll('img');

/* VELOCIDAD MÁS RÁPIDA */
let speed = 1.2;

/* AUTO SCROLL SUAVE */
let autoScroll = setInterval(() => {
    carousel.scrollLeft += speed;
    updateCenter();
}, 16); // 👈 más fluido (60fps)

/* DETECTAR CENTRO */
function updateCenter() {
    let center = carousel.scrollLeft + carousel.offsetWidth / 2;

    images.forEach(img => {
        let imgCenter = img.offsetLeft + img.offsetWidth / 2;

        if (Math.abs(center - imgCenter) < img.offsetWidth / 2) {
            img.classList.add('active');
        } else {
            img.classList.remove('active');
        }
    });
}

/* FLECHAS POTENTES */
function scrollCarousel(direction) {
    carousel.scrollBy({
        left: direction * 350, /* 👈 más distancia */
        behavior: 'smooth'
    });
}

/* PAUSA SOLO SI REALMENTE INTERACTÚA */
let isInteracting = false;

carousel.addEventListener('mousedown', () => {
    isInteracting = true;
    clearInterval(autoScroll);
});

carousel.addEventListener('touchstart', () => {
    isInteracting = true;
    clearInterval(autoScroll);
});

carousel.addEventListener('mouseup', restartScroll);
carousel.addEventListener('touchend', restartScroll);

function restartScroll() {
    if (!isInteracting) return;

    autoScroll = setInterval(() => {
        carousel.scrollLeft += speed;
        updateCenter();
    }, 16);

    isInteracting = false;
}
</script>
